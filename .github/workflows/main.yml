name: Build ArmsFix+ (Linux)

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux build dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            build-essential \
            gcc-multilib \
            g++-multilib \
            libc6-dev-i386

      - name: Install AMBuild
        run: python -m pip install --upgrade pip "git+https://github.com/alliedmodders/ambuild"

      - name: Clone SDK dependencies
        run: |
          git clone --depth 1 --branch csgo https://github.com/alliedmodders/hl2sdk.git hl2sdk-csgo
          git clone --depth 1 https://github.com/alliedmodders/metamod-source.git metamod-source
          git clone --depth 1 https://github.com/alliedmodders/sourcemod.git sourcemod

      - name: Configure extension
        run: |
          mkdir -p src/build
          cd src/build
          python ../configure.py --sdks csgo --enable-optimize

      - name: Build extension
        run: |
          cd src/build
          ambuild

      - name: Show build output
        run: |
          ls -R src/build

      - name: Assemble release package
        run: |
          rm -rf dist
          mkdir -p dist/package/addons/sourcemod/scripting/include
          cp -r src/build/package/* dist/package/
          cp addons/sourcemod/scripting/include/armsfix_plus.inc dist/package/addons/sourcemod/scripting/include/
          cp addons/sourcemod/extensions/no_ext.txt dist/package/addons/sourcemod/extensions/
          cd dist
          tar -czf armsfix-plus-linux.tar.gz package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: armsfix-plus-linux
          path: |
            dist/package/**
            dist/armsfix-plus-linux.tar.gz
